# GitVersion (https://gitversion.net) configuration for the release pipeline.
#
# Versioning is plain 3-part SemVer (https://semver.org): MAJOR.MINOR.PATCH, e.g. 1.9.1.
# The CI workflow consumes GitVersion's `majorMinorPatch` output directly as the build/release version
# (still a valid System.Version, which the launcher uses to detect newer GitHub releases).
#
# How the version advances:
#   - Every release pushed to master is tagged: the Release workflow creates a GitHub tag for the
#     computed version, and GitVersion uses that tag as the version source.
#   - The next release after a tag automatically increments the PATCH (1.9.1 -> 1.9.2 -> ...).
#   - To bump MINOR or MAJOR instead, add a marker to any commit message since the last tag:
#       +semver: feature    (or +semver: minor)    ->  1.9.1 -> 1.10.0
#       +semver: major      (or +semver: breaking) ->  1.9.1 -> 2.0.0
#       +semver: patch      (or +semver: fix)      ->  explicit patch bump (this is the default)
#       +semver: none       (or +semver: skip)     ->  no version change for that commit
#
# `next-version` only bootstraps the first release until a 3-part SemVer tag exists; once the pipeline
# has tagged a release the tag drives the version and this value is ignored. (Previous releases used a
# 4-part `1.9.0.x` scheme that GitVersion does not recognise as a version source.)
next-version: 1.9.1

# GitVersion's built-in main-line branch is keyed `main`, and its preset regex (^master$|^main$) already
# matches this repo's `master` branch, so this just overrides that preset's increment (Patch is also the
# preset default). Do NOT rename this key to `master`: a key that isn't a preset branch needs a full
# definition (including `regex`), and GitVersion fails config validation without it.
branches:
  main:
    increment: Patch

commit-message-incrementing: Enabled
major-version-bump-message: '\+semver:\s?(breaking|major)'
minor-version-bump-message: '\+semver:\s?(feature|minor)'
patch-version-bump-message: '\+semver:\s?(fix|patch)'
